services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://linkforge:linkforge@postgres:5432/linkforge?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      RATE_LIMIT_GLOBAL_MAX: ${RATE_LIMIT_GLOBAL_MAX:-1000}
      RATE_LIMIT_GLOBAL_TTL: ${RATE_LIMIT_GLOBAL_TTL:-60}
      RATE_LIMIT_IP_MAX: ${RATE_LIMIT_IP_MAX:-120}
      RATE_LIMIT_IP_TTL: ${RATE_LIMIT_IP_TTL:-60}
      RATE_LIMIT_USER_MAX: ${RATE_LIMIT_USER_MAX:-30}
      RATE_LIMIT_USER_TTL: ${RATE_LIMIT_USER_TTL:-60}
      RATE_LIMIT_SLUG_MAX: ${RATE_LIMIT_SLUG_MAX:-500}
      RATE_LIMIT_SLUG_TTL: ${RATE_LIMIT_SLUG_TTL:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - linkforge-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: linkforge
      POSTGRES_PASSWORD: linkforge
      POSTGRES_DB: linkforge
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U linkforge -d linkforge']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linkforge-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - linkforge-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  linkforge-network:
    driver: bridge
